list:
  get:
    operationId: listRoutes
    summary: List provider's routes
    description: Returns a paginated list of routes belonging to the authenticated provider. Ownership enforced — providers can only see their own routes.
    tags:
      - Routes
    security:
      - BearerAuth: []
    parameters:
      - $ref: '../components/parameters/common.yaml#/PageParam'
      - $ref: '../components/parameters/common.yaml#/PageSizeParam'
    responses:
      '200':
        description: Paginated list of routes
        content:
          application/json:
            schema:
              $ref: '../components/schemas/transport.yaml#/RouteListResponse'
      '401':
        description: Not authenticated
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      '403':
        description: Not a provider
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
  post:
    operationId: createRoute
    summary: Create a new route with stops
    description: Creates a route with an ordered list of stops. Requires PROVIDER role. The route is automatically associated with the authenticated provider.
    tags:
      - Routes
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/transport.yaml#/CreateRouteRequest'
    responses:
      '201':
        description: Route created successfully
        content:
          application/json:
            schema:
              $ref: '../components/schemas/transport.yaml#/RouteWithStopsDataResponse'
      '400':
        description: Validation error
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      '401':
        description: Not authenticated
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      '403':
        description: Not a provider
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'

byId:
  get:
    operationId: getRoute
    summary: Get route details with stops
    description: Returns a route with its ordered stops. Ownership enforced — providers can only access their own routes. Returns 404 if not found or not owned.
    tags:
      - Routes
    security:
      - BearerAuth: []
    parameters:
      - $ref: '../components/parameters/common.yaml#/IdParam'
    responses:
      '200':
        description: Route details with stops
        content:
          application/json:
            schema:
              $ref: '../components/schemas/transport.yaml#/RouteWithStopsDataResponse'
      '401':
        description: Not authenticated
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      '403':
        description: Not a provider
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      '404':
        description: Route not found or not owned by provider
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
  delete:
    operationId: deleteRoute
    summary: Delete a route
    description: Deletes a route and its associated stops (cascade). Ownership enforced — providers can only delete their own routes. Returns 404 if not found or not owned.
    tags:
      - Routes
    security:
      - BearerAuth: []
    parameters:
      - $ref: '../components/parameters/common.yaml#/IdParam'
    responses:
      '204':
        description: Route deleted successfully
      '401':
        description: Not authenticated
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      '403':
        description: Not a provider
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      '404':
        description: Route not found or not owned by provider
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
