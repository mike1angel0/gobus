list:
  get:
    operationId: listDrivers
    summary: List provider's drivers
    description: Returns a paginated list of drivers belonging to the authenticated provider. Ownership enforced.
    tags:
      - Drivers
    security:
      - BearerAuth: []
    parameters:
      - $ref: '../components/parameters/common.yaml#/PageParam'
      - $ref: '../components/parameters/common.yaml#/PageSizeParam'
    responses:
      '200':
        description: Paginated list of drivers
        content:
          application/json:
            schema:
              $ref: '../components/schemas/transport.yaml#/DriverListResponse'
      '401':
        description: Not authenticated
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      '403':
        description: Not a provider
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      '429':
        $ref: '../components/responses/errors.yaml#/TooManyRequests'
      '500':
        $ref: '../components/responses/errors.yaml#/InternalServerError'

  post:
    operationId: createDriver
    summary: Create a driver account
    description: Creates a new user account with DRIVER role linked to the authenticated provider. Requires PROVIDER role. Ownership enforced — drivers are automatically linked to the provider.
    tags:
      - Drivers
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/transport.yaml#/CreateDriverRequest'
    responses:
      '201':
        description: Driver created successfully
        content:
          application/json:
            schema:
              $ref: '../components/schemas/transport.yaml#/DriverDataResponse'
      '400':
        description: Validation error
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      '401':
        description: Not authenticated
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      '403':
        description: Not a provider
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      '409':
        description: Email already registered
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      '429':
        $ref: '../components/responses/errors.yaml#/TooManyRequests'
      '500':
        $ref: '../components/responses/errors.yaml#/InternalServerError'

byId:
  delete:
    operationId: deleteDriver
    summary: Delete a driver
    description: Deletes a driver account. Ownership enforced — providers can only delete drivers linked to their organization. Returns 404 if not found or not owned.
    tags:
      - Drivers
    security:
      - BearerAuth: []
    parameters:
      - $ref: '../components/parameters/common.yaml#/IdParam'
    responses:
      '204':
        description: Driver deleted successfully
      '401':
        description: Not authenticated
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      '403':
        description: Not a provider
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      '404':
        description: Driver not found or not owned by provider
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      '429':
        $ref: '../components/responses/errors.yaml#/TooManyRequests'
      '500':
        $ref: '../components/responses/errors.yaml#/InternalServerError'

