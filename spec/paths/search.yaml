search:
  get:
    operationId: searchTrips
    summary: Search for available trips
    description: Searches for available trips between origin and destination on a given date. Public endpoint — no authentication required. Returns matching schedules with availability and computed segment prices.
    tags:
      - Search
    security: []
    parameters:
      - name: origin
        in: query
        required: true
        description: Origin stop name (minimum 2 characters, case-insensitive partial match)
        schema:
          type: string
          minLength: 2
          maxLength: 200
      - name: destination
        in: query
        required: true
        description: Destination stop name (minimum 2 characters, case-insensitive partial match)
        schema:
          type: string
          minLength: 2
          maxLength: 200
      - name: date
        in: query
        required: true
        description: Trip date (ISO 8601 date format, e.g. 2026-03-25)
        schema:
          type: string
          format: date
          maxLength: 10
      - $ref: '../components/parameters/common.yaml#/PageParam'
      - name: pageSize
        in: query
        description: Number of items per page (max 50 for search)
        schema:
          type: integer
          minimum: 1
          maximum: 50
          default: 20
    responses:
      '200':
        description: List of available trips matching the search criteria
        content:
          application/json:
            schema:
              $ref: '../components/schemas/search.yaml#/SearchResultListResponse'
      '400':
        description: Validation error (missing or invalid query parameters)
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      '500':
        $ref: '../components/responses/errors.yaml#/InternalServerError'

tripDetail:
  get:
    operationId: getTripDetails
    summary: Get trip details with seat availability
    description: Returns detailed trip information including the seat map with per-seat availability status. Public endpoint — no authentication required. The tripDate query parameter specifies which date to check availability for.
    tags:
      - Search
    security: []
    parameters:
      - name: scheduleId
        in: path
        required: true
        description: Schedule identifier
        schema:
          type: string
          minLength: 1
          maxLength: 30
      - name: tripDate
        in: query
        required: true
        description: Trip date to check seat availability for (ISO 8601 date format)
        schema:
          type: string
          format: date
          maxLength: 10
    responses:
      '200':
        description: Trip details with seat availability
        content:
          application/json:
            schema:
              $ref: '../components/schemas/search.yaml#/TripDetailDataResponse'
      '400':
        description: Validation error (missing tripDate)
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      '404':
        description: Schedule not found
        content:
          application/json:
            schema:
              $ref: '../components/schemas/common.yaml#/ErrorResponse'
      '500':
        $ref: '../components/responses/errors.yaml#/InternalServerError'
