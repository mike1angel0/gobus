openapi: 3.1.0
info:
  title: GoBus API
  version: 1.0.0
  description: Bus transport platform API for managing routes, schedules, bookings, and live tracking.
  license:
    name: UNLICENSED
  contact:
    name: GoBus Support
    email: support@gobus.ro
servers:
  - url: http://localhost:3000
    description: Local development

security: []

paths:
  /api/v1/auth/register:
    $ref: paths/auth.yaml#/register
  /api/v1/auth/login:
    $ref: paths/auth.yaml#/login
  /api/v1/auth/refresh:
    $ref: paths/auth.yaml#/refresh
  /api/v1/auth/logout:
    $ref: paths/auth.yaml#/logout
  /api/v1/auth/forgot-password:
    $ref: paths/auth.yaml#/forgot-password
  /api/v1/auth/reset-password:
    $ref: paths/auth.yaml#/reset-password
  /api/v1/auth/change-password:
    $ref: paths/auth.yaml#/change-password
  /api/v1/auth/me:
    $ref: paths/auth.yaml#/me
  /api/v1/providers/me:
    $ref: paths/providers.yaml#/me
  /api/v1/provider/analytics:
    $ref: paths/providers.yaml#/analytics
  /api/v1/routes:
    $ref: paths/routes.yaml#/list
  /api/v1/routes/{id}:
    $ref: paths/routes.yaml#/byId
  /api/v1/buses:
    $ref: paths/buses.yaml#/list
  /api/v1/buses/{id}:
    $ref: paths/buses.yaml#/byId
  /api/v1/buses/templates:
    $ref: paths/buses.yaml#/templates
  /api/v1/drivers:
    $ref: paths/drivers.yaml#/list
  /api/v1/drivers/{id}:
    $ref: paths/drivers.yaml#/byId
  /api/v1/schedules:
    $ref: paths/schedules.yaml#/list
  /api/v1/schedules/{id}:
    $ref: paths/schedules.yaml#/byId
  /api/v1/cities:
    $ref: paths/search.yaml#/cities
  /api/v1/search:
    $ref: paths/search.yaml#/search
  /api/v1/trips/{scheduleId}:
    $ref: paths/search.yaml#/tripDetail
  /api/v1/bookings:
    $ref: paths/bookings.yaml#/list
  /api/v1/bookings/{id}:
    $ref: paths/bookings.yaml#/byId
  /api/v1/tracking/{busId}:
    $ref: paths/tracking.yaml#/byBusId
  /api/v1/tracking:
    $ref: paths/tracking.yaml#/update
  /api/v1/driver/trips:
    $ref: paths/driver-trips.yaml#/list
  /api/v1/driver/trips/{scheduleId}:
    $ref: paths/driver-trips.yaml#/detail
  /api/v1/driver/trips/{scheduleId}/passengers:
    $ref: paths/driver-trips.yaml#/passengers
  /api/v1/delays:
    $ref: paths/delays.yaml#/list
  /api/v1/delays/{id}:
    $ref: paths/delays.yaml#/byId
  /api/v1/admin/buses:
    $ref: paths/admin.yaml#/buses
  /api/v1/admin/users:
    $ref: paths/admin.yaml#/users
  /api/v1/admin/users/{id}:
    $ref: paths/admin.yaml#/userById
  /api/v1/admin/users/{id}/status:
    $ref: paths/admin.yaml#/userStatus
  /api/v1/admin/users/{id}/sessions:
    $ref: paths/admin.yaml#/userSessions
  /api/v1/admin/audit-logs:
    $ref: paths/admin.yaml#/auditLogs
  /api/v1/admin/seats/{id}:
    $ref: paths/admin.yaml#/seatById
  /api/v1/admin/stations:
    $ref: paths/stations.yaml#/adminStations
  /api/v1/admin/stations/{id}:
    $ref: paths/stations.yaml#/adminStationById
  /api/v1/admin/stations/merge:
    $ref: paths/stations.yaml#/adminMergeStations
  /api/v1/stations:
    $ref: paths/stations.yaml#/publicStations

components:
  securitySchemes:
    BearerAuth:
      $ref: components/securitySchemes.yaml#/BearerAuth
  parameters:
    PageParam:
      $ref: components/parameters/common.yaml#/PageParam
    PageSizeParam:
      $ref: components/parameters/common.yaml#/PageSizeParam
    IdParam:
      $ref: components/parameters/common.yaml#/IdParam
  schemas:
    ErrorResponse:
      $ref: components/schemas/common.yaml#/ErrorResponse
    FieldError:
      $ref: components/schemas/common.yaml#/FieldError
    PaginationMeta:
      $ref: components/schemas/common.yaml#/PaginationMeta
