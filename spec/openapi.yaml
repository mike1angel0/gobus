openapi: 3.1.0
info:
  title: Transio API
  version: 1.0.0
  description: Bus transport platform API for managing routes, schedules, bookings, and live tracking.
  license:
    name: UNLICENSED
  contact:
    name: Transio Support
    email: support@transio.app
servers:
  - url: http://localhost:3000
    description: Local development

security: []

paths:
  /api/v1/auth/register:
    post:
      operationId: register
      summary: Register a new user account
      description: Creates a new user account. If role is PROVIDER, also creates a provider entity.
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthDataResponse'
        '400':
          description: Validation error (weak password, missing fields)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/login:
    post:
      operationId: login
      summary: Log in with email and password
      description: Authenticates a user and returns JWT tokens. Returns 423 if the account is locked due to too many failed attempts.
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthDataResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Account is suspended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '423':
          description: Account is locked due to too many failed login attempts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/refresh:
    post:
      operationId: refreshToken
      summary: Refresh access token
      description: Exchanges a valid refresh token for a new token pair. The old refresh token is revoked (rotation).
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
      responses:
        '200':
          description: Tokens refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefreshDataResponse'
        '401':
          description: Invalid, expired, or revoked refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/logout:
    post:
      operationId: logout
      summary: Log out and revoke refresh token
      description: Revokes the provided refresh token, effectively logging the user out of that session.
      tags:
        - Auth
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: Logged out successfully
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/forgot-password:
    post:
      operationId: forgotPassword
      summary: Request a password reset email
      description: Generates a password reset token and sends a reset email. Always returns 200 to prevent email enumeration.
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: If the email exists, a reset link has been sent. Always returns 200.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageDataResponse'

  /api/v1/auth/reset-password:
    post:
      operationId: resetPassword
      summary: Reset password using a token
      description: Resets the user's password using a valid reset token. The token is single-use and expires after 1 hour. All existing refresh tokens are revoked.
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageDataResponse'
        '400':
          description: Invalid or expired reset token, or weak password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/change-password:
    post:
      operationId: changePassword
      summary: Change password while logged in
      description: Changes the user's password. Requires the current password for verification. All other refresh tokens are revoked.
      tags:
        - Auth
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageDataResponse'
        '400':
          description: Weak new password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Current password is incorrect or not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/me:
    get:
      operationId: getProfile
      summary: Get current user profile
      description: Returns the authenticated user's profile information.
      tags:
        - Auth
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDataResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      operationId: updateProfile
      summary: Update current user profile
      description: Updates the authenticated user's profile. Only provided fields are updated.
      tags:
        - Auth
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDataResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token with 15-minute expiry

  schemas:
    # --- Enums ---
    Role:
      type: string
      description: User role determining access level
      enum:
        - PASSENGER
        - PROVIDER
        - DRIVER
        - ADMIN

    UserStatus:
      type: string
      description: Account status affecting login ability
      enum:
        - ACTIVE
        - SUSPENDED
        - LOCKED

    # --- Auth Schemas ---
    RegisterRequest:
      type: object
      description: Request body for user registration
      required:
        - email
        - password
        - name
        - role
      properties:
        email:
          type: string
          format: email
          maxLength: 255
          description: User's email address (must be unique)
        password:
          type: string
          minLength: 8
          maxLength: 128
          description: >-
            Password must be at least 8 characters and contain at least one
            uppercase letter, one lowercase letter, and one digit.
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: User's full name
        role:
          type: string
          enum:
            - PASSENGER
            - PROVIDER
          description: Account type (only PASSENGER and PROVIDER can self-register)
        phone:
          type: string
          maxLength: 20
          description: Optional phone number
        providerName:
          type: string
          minLength: 1
          maxLength: 200
          description: Required when role is PROVIDER. Name of the transport company.

    LoginRequest:
      type: object
      description: Request body for user login
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          maxLength: 255
          description: Registered email address
        password:
          type: string
          maxLength: 128
          description: Account password

    TokenRefreshRequest:
      type: object
      description: Request body for refreshing an access token
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          maxLength: 500
          description: The refresh token received during login or previous refresh

    LogoutRequest:
      type: object
      description: Request body for logout
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          maxLength: 500
          description: The refresh token to revoke

    ForgotPasswordRequest:
      type: object
      description: Request body for requesting a password reset
      required:
        - email
      properties:
        email:
          type: string
          format: email
          maxLength: 255
          description: Email address associated with the account

    ResetPasswordRequest:
      type: object
      description: Request body for resetting a password with a token
      required:
        - token
        - newPassword
      properties:
        token:
          type: string
          maxLength: 500
          description: Password reset token received via email
        newPassword:
          type: string
          minLength: 8
          maxLength: 128
          description: >-
            New password. Must be at least 8 characters and contain at least one
            uppercase letter, one lowercase letter, and one digit.

    ChangePasswordRequest:
      type: object
      description: Request body for changing password while logged in
      required:
        - currentPassword
        - newPassword
      properties:
        currentPassword:
          type: string
          maxLength: 128
          description: The user's current password for verification
        newPassword:
          type: string
          minLength: 8
          maxLength: 128
          description: >-
            New password. Must be at least 8 characters and contain at least one
            uppercase letter, one lowercase letter, and one digit.

    UserUpdate:
      type: object
      description: Request body for updating user profile. Only provided fields are updated.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: User's full name
        phone:
          type: string
          maxLength: 20
          description: Phone number
        avatarUrl:
          type: string
          format: uri
          maxLength: 2048
          description: URL to user's avatar image
        preferences:
          $ref: '#/components/schemas/UserPreferences'

    UserPreferences:
      type: object
      description: User notification and display preferences
      properties:
        language:
          type: string
          maxLength: 10
          description: Preferred language code (e.g., en, ro)
        notifications:
          type: boolean
          description: Whether to receive push notifications
        emailNotifications:
          type: boolean
          description: Whether to receive email notifications

    # --- Response Schemas ---
    User:
      type: object
      description: User profile information
      required:
        - id
        - email
        - name
        - role
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          maxLength: 30
          description: Unique user identifier (cuid)
        email:
          type: string
          format: email
          maxLength: 255
          description: User's email address
        name:
          type: string
          maxLength: 100
          description: User's full name
        role:
          $ref: '#/components/schemas/Role'
        phone:
          type:
            - string
            - 'null'
          maxLength: 20
          description: User's phone number
        avatarUrl:
          type:
            - string
            - 'null'
          format: uri
          maxLength: 2048
          description: URL to user's avatar image
        preferences:
          $ref: '#/components/schemas/UserPreferences'
        providerId:
          type:
            - string
            - 'null'
          maxLength: 30
          description: Associated provider ID (for PROVIDER and DRIVER roles)
        status:
          $ref: '#/components/schemas/UserStatus'
        createdAt:
          type: string
          format: date-time
          description: Account creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp

    LoginResponse:
      type: object
      description: Authentication response containing tokens and user profile
      required:
        - accessToken
        - refreshToken
        - user
      properties:
        accessToken:
          type: string
          maxLength: 2000
          description: JWT access token (expires in 15 minutes)
        refreshToken:
          type: string
          maxLength: 500
          description: Refresh token (expires in 7 days)
        user:
          $ref: '#/components/schemas/User'

    TokenRefreshResponse:
      type: object
      description: New token pair after refresh
      required:
        - accessToken
        - refreshToken
      properties:
        accessToken:
          type: string
          maxLength: 2000
          description: New JWT access token (expires in 15 minutes)
        refreshToken:
          type: string
          maxLength: 500
          description: New refresh token (expires in 7 days)

    MessageResponse:
      type: object
      description: Simple message response
      required:
        - message
      properties:
        message:
          type: string
          maxLength: 500
          description: Human-readable message

    # --- API Envelope Wrappers ---
    AuthDataResponse:
      type: object
      description: API response envelope wrapping auth data
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/LoginResponse'

    TokenRefreshDataResponse:
      type: object
      description: API response envelope wrapping token refresh data
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/TokenRefreshResponse'

    UserDataResponse:
      type: object
      description: API response envelope wrapping user data
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/User'

    MessageDataResponse:
      type: object
      description: API response envelope wrapping a message
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/MessageResponse'

    # --- Pagination ---
    PaginationMeta:
      type: object
      description: Pagination metadata for list responses
      required:
        - total
        - page
        - pageSize
        - totalPages
      properties:
        total:
          type: integer
          minimum: 0
          description: Total number of records matching the query
        page:
          type: integer
          minimum: 1
          description: Current page number (1-based)
        pageSize:
          type: integer
          minimum: 1
          maximum: 100
          description: Number of records per page
        totalPages:
          type: integer
          minimum: 0
          description: Total number of pages

    # --- Error Response (RFC 9457) ---
    ErrorResponse:
      type: object
      description: Error response following RFC 9457 Problem Details format
      required:
        - type
        - title
        - status
      properties:
        type:
          type: string
          format: uri
          maxLength: 500
          description: A URI reference identifying the problem type
        title:
          type: string
          maxLength: 200
          description: A short human-readable summary of the problem
        status:
          type: integer
          minimum: 100
          maximum: 599
          description: The HTTP status code
        detail:
          type: string
          maxLength: 1000
          description: A human-readable explanation specific to this occurrence
        code:
          type: string
          maxLength: 100
          description: Application-specific error code
        errors:
          type: array
          maxItems: 100
          description: Validation errors for individual fields
          items:
            $ref: '#/components/schemas/FieldError'

    FieldError:
      type: object
      description: A validation error for a specific field
      required:
        - field
        - message
      properties:
        field:
          type: string
          maxLength: 200
          description: The field path that caused the error
        message:
          type: string
          maxLength: 500
          description: Human-readable error message for this field
