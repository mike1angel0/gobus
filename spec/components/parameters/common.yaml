PageParam:
  name: page
  in: query
  description: Page number (1-based)
  schema:
    type: integer
    minimum: 1
    maximum: 10000
    default: 1
PageSizeParam:
  name: pageSize
  in: query
  description: Number of items per page
  schema:
    type: integer
    minimum: 1
    maximum: 100
    default: 20
IdParam:
  name: id
  in: path
  required: true
  description: Resource identifier (cuid)
  schema:
    type: string
    minLength: 1
    maxLength: 30
