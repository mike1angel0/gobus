ProviderStatus:
  type: string
  description: Provider approval status
  enum:
    - APPROVED
    - PENDING

Provider:
  type: object
  description: Transport provider (bus company)
  required:
    - id
    - name
    - status
    - createdAt
    - updatedAt
  properties:
    id:
      type: string
      maxLength: 30
      description: Unique provider identifier (cuid)
    name:
      type: string
      maxLength: 200
      description: Provider company name
    code:
      type: string
      maxLength: 10
      pattern: '^[A-Z]{3}$'
      description: Unique 3-letter provider code used in order IDs (e.g. TRA, CAR)
    logo:
      type:
        - string
        - 'null'
      format: uri
      maxLength: 2048
      description: URL to provider logo image
    contactEmail:
      type:
        - string
        - 'null'
      format: email
      maxLength: 255
      description: Provider contact email
    contactPhone:
      type:
        - string
        - 'null'
      maxLength: 20
      description: Provider contact phone number
    status:
      $ref: '#/ProviderStatus'
    createdAt:
      type: string
      format: date-time
      maxLength: 30
      description: Provider creation timestamp
    updatedAt:
      type: string
      format: date-time
      maxLength: 30
      description: Last update timestamp

RevenueByRoute:
  type: object
  description: Revenue breakdown for a single route
  required:
    - routeId
    - routeName
    - revenue
  properties:
    routeId:
      type: string
      maxLength: 30
      description: Route identifier
    routeName:
      type: string
      maxLength: 200
      description: Route name
    revenue:
      type: number
      format: double
      minimum: 0
      maximum: 100000000
      description: Total revenue for this route

ProviderAnalytics:
  type: object
  description: Dashboard analytics for a provider
  required:
    - totalBookings
    - totalRevenue
    - averageOccupancy
    - revenueByRoute
  properties:
    totalBookings:
      type: integer
      minimum: 0
      maximum: 2147483647
      description: Total number of confirmed bookings
    totalRevenue:
      type: number
      format: double
      minimum: 0
      maximum: 100000000
      description: Total revenue from confirmed bookings
    averageOccupancy:
      type: number
      format: double
      minimum: 0
      maximum: 1
      description: Average seat occupancy ratio (0 to 1)
    revenueByRoute:
      type: array
      minItems: 0
      maxItems: 100
      description: Revenue breakdown per route
      items:
        $ref: '#/RevenueByRoute'

ProviderAnalyticsDataResponse:
  type: object
  description: API response envelope wrapping provider analytics data
  required:
    - data
  properties:
    data:
      $ref: '#/ProviderAnalytics'

ProviderDataResponse:
  type: object
  description: API response envelope wrapping provider data
  required:
    - data
  properties:
    data:
      $ref: '#/Provider'
