StationType:
  type: string
  description: Classification of a station by size and facilities
  enum:
    - HUB
    - STATION
    - STOP

StationFacility:
  type: string
  description: Facility available at a station
  enum:
    - WIFI
    - PARKING
    - WAITING_ROOM
    - RESTROOM
    - TICKET_OFFICE
    - LUGGAGE_STORAGE

Station:
  type: object
  description: A bus station, hub, or stop with location and facility information
  required:
    - id
    - name
    - cityName
    - type
    - address
    - lat
    - lng
    - facilities
    - isActive
    - createdBy
    - createdAt
    - updatedAt
  properties:
    id:
      type: string
      maxLength: 30
      description: Unique station identifier (cuid)
    name:
      type: string
      maxLength: 200
      description: Station display name (e.g., Autogara Nord)
    cityName:
      type: string
      maxLength: 200
      description: City where the station is located
    type:
      $ref: '#/StationType'
    address:
      type: string
      maxLength: 500
      description: Full street address
    lat:
      type: number
      format: double
      minimum: -90
      maximum: 90
      description: Latitude coordinate
    lng:
      type: number
      format: double
      minimum: -180
      maximum: 180
      description: Longitude coordinate
    facilities:
      type: array
      minItems: 0
      maxItems: 20
      description: List of facilities available at this station
      items:
        $ref: '#/StationFacility'
    phone:
      type: ['string', 'null']
      maxLength: 20
      description: Station contact phone number
    email:
      type: ['string', 'null']
      maxLength: 255
      description: Station contact email address
    platformCount:
      type: ['integer', 'null']
      minimum: 0
      maximum: 100
      description: Number of bus platforms/bays
    isActive:
      type: boolean
      description: Whether the station is currently active
    createdBy:
      type: string
      maxLength: 30
      description: ID of the user who created this station
    createdAt:
      type: string
      format: date-time
      maxLength: 30
      description: Station creation timestamp
    updatedAt:
      type: string
      format: date-time
      maxLength: 30
      description: Station last update timestamp

CreateStationRequest:
  type: object
  description: Request body for creating a station (admin creates HUB/STATION)
  required:
    - name
    - cityName
    - type
    - address
    - lat
    - lng
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 200
      description: Station display name
    cityName:
      type: string
      minLength: 1
      maxLength: 200
      description: City where the station is located
    type:
      $ref: '#/StationType'
    address:
      type: string
      minLength: 1
      maxLength: 500
      description: Full street address
    lat:
      type: number
      format: double
      minimum: -90
      maximum: 90
      description: Latitude coordinate
    lng:
      type: number
      format: double
      minimum: -180
      maximum: 180
      description: Longitude coordinate
    facilities:
      type: array
      minItems: 0
      maxItems: 20
      description: List of facilities available at this station
      items:
        $ref: '#/StationFacility'
    phone:
      type: string
      maxLength: 20
      description: Station contact phone number
    email:
      type: string
      format: email
      maxLength: 255
      description: Station contact email address
    platformCount:
      type: integer
      minimum: 0
      maximum: 100
      description: Number of bus platforms/bays

UpdateStationRequest:
  type: object
  description: Request body for updating a station (all fields optional)
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 200
      description: Station display name
    cityName:
      type: string
      minLength: 1
      maxLength: 200
      description: City where the station is located
    type:
      $ref: '#/StationType'
    address:
      type: string
      minLength: 1
      maxLength: 500
      description: Full street address
    lat:
      type: number
      format: double
      minimum: -90
      maximum: 90
      description: Latitude coordinate
    lng:
      type: number
      format: double
      minimum: -180
      maximum: 180
      description: Longitude coordinate
    facilities:
      type: array
      minItems: 0
      maxItems: 20
      description: List of facilities available at this station
      items:
        $ref: '#/StationFacility'
    phone:
      type: ['string', 'null']
      maxLength: 20
      description: Station contact phone number
    email:
      type: ['string', 'null']
      maxLength: 255
      description: Station contact email address
    platformCount:
      type: ['integer', 'null']
      minimum: 0
      maximum: 100
      description: Number of bus platforms/bays
    isActive:
      type: boolean
      description: Whether the station is currently active

ProviderCreateStopRequest:
  type: object
  description: Request body for a provider to create a simple stop (type auto-set to STOP)
  required:
    - name
    - cityName
    - address
    - lat
    - lng
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 200
      description: Stop display name
    cityName:
      type: string
      minLength: 1
      maxLength: 200
      description: City where the stop is located
    address:
      type: string
      minLength: 1
      maxLength: 500
      description: Full street address
    lat:
      type: number
      format: double
      minimum: -90
      maximum: 90
      description: Latitude coordinate
    lng:
      type: number
      format: double
      minimum: -180
      maximum: 180
      description: Longitude coordinate

MergeStationsRequest:
  type: object
  description: Request body for merging two stations (source merged into target)
  required:
    - sourceId
    - targetId
  properties:
    sourceId:
      type: string
      minLength: 1
      maxLength: 30
      description: ID of the station to merge from (will be deactivated)
    targetId:
      type: string
      minLength: 1
      maxLength: 30
      description: ID of the station to merge into (will receive all references)

StationDataResponse:
  type: object
  description: API response envelope wrapping a single station
  required:
    - data
  properties:
    data:
      $ref: '#/Station'

StationListResponse:
  type: object
  description: Paginated list of stations
  required:
    - data
    - meta
  properties:
    data:
      type: array
      minItems: 0
      maxItems: 100
      description: Stations for the current page
      items:
        $ref: '#/Station'
    meta:
      $ref: './common.yaml#/PaginationMeta'
