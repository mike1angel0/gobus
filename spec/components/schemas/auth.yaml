Role:
  type: string
  description: User role determining access level
  enum:
    - PASSENGER
    - PROVIDER
    - DRIVER
    - ADMIN

UserStatus:
  type: string
  description: Account status affecting login ability
  enum:
    - ACTIVE
    - SUSPENDED
    - LOCKED

RegisterRequest:
  type: object
  description: Request body for user registration
  required:
    - email
    - password
    - name
    - role
  properties:
    email:
      type: string
      format: email
      maxLength: 255
      description: User's email address (must be unique)
    password:
      type: string
      minLength: 8
      maxLength: 128
      pattern: '^(?=.*[A-Z])(?=.*[a-z])(?=.*\d).+'
      description: >-
        Password must be at least 8 characters and contain at least one
        uppercase letter, one lowercase letter, and one digit.
    name:
      type: string
      minLength: 1
      maxLength: 100
      description: User's full name
    role:
      type: string
      enum:
        - PASSENGER
        - PROVIDER
      description: Account type (only PASSENGER and PROVIDER can self-register)
    phone:
      type: string
      maxLength: 20
      description: Optional phone number
    providerName:
      type: string
      minLength: 1
      maxLength: 200
      description: Required when role is PROVIDER. Name of the transport company.

LoginRequest:
  type: object
  description: Request body for user login
  required:
    - email
    - password
  properties:
    email:
      type: string
      format: email
      maxLength: 255
      description: Registered email address
    password:
      type: string
      minLength: 1
      maxLength: 128
      description: Account password

TokenRefreshRequest:
  type: object
  description: Request body for refreshing an access token
  required:
    - refreshToken
  properties:
    refreshToken:
      type: string
      minLength: 1
      maxLength: 500
      description: The refresh token received during login or previous refresh

LogoutRequest:
  type: object
  description: Request body for logout
  required:
    - refreshToken
  properties:
    refreshToken:
      type: string
      minLength: 1
      maxLength: 500
      description: The refresh token to revoke

ForgotPasswordRequest:
  type: object
  description: Request body for requesting a password reset
  required:
    - email
  properties:
    email:
      type: string
      format: email
      maxLength: 255
      description: Email address associated with the account

ResetPasswordRequest:
  type: object
  description: Request body for resetting a password with a token
  required:
    - token
    - newPassword
  properties:
    token:
      type: string
      minLength: 1
      maxLength: 500
      description: Password reset token received via email
    newPassword:
      type: string
      minLength: 8
      maxLength: 128
      pattern: '^(?=.*[A-Z])(?=.*[a-z])(?=.*\d).+'
      description: >-
        New password. Must be at least 8 characters and contain at least one
        uppercase letter, one lowercase letter, and one digit.

ChangePasswordRequest:
  type: object
  description: Request body for changing password while logged in
  required:
    - currentPassword
    - newPassword
  properties:
    currentPassword:
      type: string
      minLength: 1
      maxLength: 128
      description: The user's current password for verification
    newPassword:
      type: string
      minLength: 8
      maxLength: 128
      pattern: '^(?=.*[A-Z])(?=.*[a-z])(?=.*\d).+'
      description: >-
        New password. Must be at least 8 characters and contain at least one
        uppercase letter, one lowercase letter, and one digit.

UserUpdate:
  type: object
  description: Request body for updating user profile. Only provided fields are updated.
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 100
      description: User's full name
    phone:
      type: string
      maxLength: 20
      description: Phone number
    avatarUrl:
      type: string
      format: uri
      maxLength: 2048
      description: URL to user's avatar image
    preferences:
      $ref: '#/UserPreferences'

UserPreferences:
  type: object
  description: User notification and display preferences
  properties:
    language:
      type: string
      maxLength: 10
      description: Preferred language code (e.g., en, ro)
    notifications:
      type: boolean
      description: Whether to receive push notifications
    emailNotifications:
      type: boolean
      description: Whether to receive email notifications

User:
  type: object
  description: User profile information
  required:
    - id
    - email
    - name
    - role
    - status
    - createdAt
    - updatedAt
  properties:
    id:
      type: string
      maxLength: 30
      description: Unique user identifier (cuid)
    email:
      type: string
      format: email
      maxLength: 255
      description: User's email address
    name:
      type: string
      maxLength: 100
      description: User's full name
    role:
      $ref: '#/Role'
    phone:
      type:
        - string
        - 'null'
      maxLength: 20
      description: User's phone number
    avatarUrl:
      type:
        - string
        - 'null'
      format: uri
      maxLength: 2048
      description: URL to user's avatar image
    preferences:
      $ref: '#/UserPreferences'
    providerId:
      type:
        - string
        - 'null'
      maxLength: 30
      description: Associated provider ID (for PROVIDER and DRIVER roles)
    status:
      $ref: '#/UserStatus'
    createdAt:
      type: string
      format: date-time
      description: Account creation timestamp
    updatedAt:
      type: string
      format: date-time
      description: Last update timestamp

LoginResponse:
  type: object
  description: Authentication response containing tokens and user profile
  required:
    - accessToken
    - refreshToken
    - user
  properties:
    accessToken:
      type: string
      maxLength: 2000
      description: JWT access token (expires in 15 minutes)
    refreshToken:
      type: string
      maxLength: 500
      description: Refresh token (expires in 7 days)
    user:
      $ref: '#/User'

TokenRefreshResponse:
  type: object
  description: New token pair after refresh
  required:
    - accessToken
    - refreshToken
  properties:
    accessToken:
      type: string
      maxLength: 2000
      description: New JWT access token (expires in 15 minutes)
    refreshToken:
      type: string
      maxLength: 500
      description: New refresh token (expires in 7 days)

MessageResponse:
  type: object
  description: Simple message response
  required:
    - message
  properties:
    message:
      type: string
      maxLength: 500
      description: Human-readable message

AuthDataResponse:
  type: object
  description: API response envelope wrapping auth data
  required:
    - data
  properties:
    data:
      $ref: '#/LoginResponse'

TokenRefreshDataResponse:
  type: object
  description: API response envelope wrapping token refresh data
  required:
    - data
  properties:
    data:
      $ref: '#/TokenRefreshResponse'

UserDataResponse:
  type: object
  description: API response envelope wrapping user data
  required:
    - data
  properties:
    data:
      $ref: '#/User'

MessageDataResponse:
  type: object
  description: API response envelope wrapping a message
  required:
    - data
  properties:
    data:
      $ref: '#/MessageResponse'
