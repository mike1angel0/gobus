BadRequest:
  description: Validation error
  content:
    application/json:
      schema:
        $ref: '../schemas/common.yaml#/ErrorResponse'
Unauthorized:
  description: Not authenticated
  content:
    application/json:
      schema:
        $ref: '../schemas/common.yaml#/ErrorResponse'
Forbidden:
  description: Insufficient permissions
  content:
    application/json:
      schema:
        $ref: '../schemas/common.yaml#/ErrorResponse'
NotFound:
  description: Resource not found
  content:
    application/json:
      schema:
        $ref: '../schemas/common.yaml#/ErrorResponse'
Conflict:
  description: Resource conflict
  content:
    application/json:
      schema:
        $ref: '../schemas/common.yaml#/ErrorResponse'
Locked:
  description: Account is locked due to too many failed login attempts
  content:
    application/json:
      schema:
        $ref: '../schemas/common.yaml#/ErrorResponse'
TooManyRequests:
  description: Rate limit exceeded
  headers:
    X-RateLimit-Limit:
      description: Maximum number of requests allowed in the time window
      schema:
        type: integer
        example: 100
    X-RateLimit-Remaining:
      description: Number of requests remaining in the current time window
      schema:
        type: integer
        example: 0
    X-RateLimit-Reset:
      description: Unix timestamp (seconds) when the rate limit resets
      schema:
        type: integer
        example: 1700000000
    Retry-After:
      description: Seconds to wait before retrying
      schema:
        type: integer
        example: 60
  content:
    application/json:
      schema:
        $ref: '../schemas/common.yaml#/ErrorResponse'
InternalServerError:
  description: Internal server error
  content:
    application/json:
      schema:
        $ref: '../schemas/common.yaml#/ErrorResponse'
